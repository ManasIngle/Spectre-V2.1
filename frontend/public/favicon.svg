<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ff" />
      <stop offset="100%" stop-color="#f0f" />
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <rect width="120" height="120" rx="30" fill="url(#neonGradient)" opacity="0.15" />
  <rect x="10" y="10" width="100" height="100" rx="20" fill="transparent" stroke="url(#neonGradient)" stroke-width="4" opacity="0.3" />
  
  <!-- Line Chart Path with Neon Glow -->
  <path d="M 25 85 L 45 55 L 60 65 L 80 35 L 95 45" 
        fill="none" 
        stroke="url(#neonGradient)" 
        stroke-width="10" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#neonGlow)" />
  
  <!-- Candlesticks / Bars -->
  <line x1="25" y1="85" x2="25" y2="100" stroke="#0ff" stroke-width="4" opacity="0.4" />
  <line x1="45" y1="55" x2="45" y2="100" stroke="#f0f" stroke-width="4" opacity="0.4" />
  <line x1="60" y1="65" x2="60" y2="100" stroke="#0ff" stroke-width="4" opacity="0.4" />
  <line x1="80" y1="35" x2="80" y2="100" stroke="#f0f" stroke-width="4" opacity="0.4" />
</svg>
