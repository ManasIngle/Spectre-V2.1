version: "3.9"

services:
  spectre:
    build: .
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - GIN_MODE=release

  ml-sidecar:
    build:
      context: .
      dockerfile: ml_sidecar/Dockerfile
    ports:
      - "127.0.0.1:8001:8001"
    restart: unless-stopped
    volumes:
      - ../v2-placeholder-30-march/backend/ml:/models:ro
