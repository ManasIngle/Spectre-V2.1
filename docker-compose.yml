version: "3.9"

services:
  spectre:
    build: .
    ports:
      - "8239:8239"
    restart: unless-stopped
    environment:
      - GIN_MODE=release

  ml-sidecar:
    build:
      context: .
      dockerfile: ml_sidecar/Dockerfile
    ports:
      - "127.0.0.1:8240:8240"
    restart: unless-stopped
    volumes:
      - ./ml_sidecar/models:/models:ro
