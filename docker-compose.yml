version: "3.9"

services:
  spectre:
    build: .
    ports:
      - "8239:8239"
    restart: unless-stopped
    environment:
      - GIN_MODE=release
      - TZ=Asia/Kolkata
      - RESET_KEY=spectre-reset-2024
      # Persistent CSV storage — survives container rebuilds.
      - SPECTRE_DATA_DIR=/app/data
      # Auth — set in Dokploy. SESSION_SECRET should be a random 32+ byte hex string.
      # BOOTSTRAP_ADMIN_USER + BOOTSTRAP_ADMIN_PASSWORD only used on first startup
      # if data/users.json doesn't exist — remove from Dokploy after first login.
      - SESSION_SECRET=${SESSION_SECRET}
      - BOOTSTRAP_ADMIN_USER=${BOOTSTRAP_ADMIN_USER:-admin}
      - BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD}
    volumes:
      # Named volume — managed by Docker, independent of git checkout.
      # Survives Dokploy redeploys, repo re-clones, and `docker compose down`.
      # Backed up via Dokploy's "Volume Backups" tab.
      - spectre_data:/app/data
    depends_on:
      ml-sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8239/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ml-sidecar:
    build:
      context: .
      dockerfile: ml_sidecar/Dockerfile
    ports:
      - "127.0.0.1:8240:8240"
    restart: unless-stopped
    environment:
      - TZ=Asia/Kolkata
    volumes:
      # Trained model artifacts — read-only, shipped with the repo.
      - ./ml_sidecar/models:/app/models:ro
      # Overnight model runtime data (predictions log + refreshed parquet).
      # Named volume so daily predictions accumulate across deploys.
      - overnight_data:/app/models/overnight_nifty/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8240/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      spectre:
        condition: service_healthy
      ml-sidecar:
        condition: service_healthy

volumes:
  spectre_data:        # system_signals.csv, option_price_array.csv
  overnight_data:      # overnight_predictions.csv, overnight_raw.parquet
