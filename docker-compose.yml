version: "3.9"

services:
  spectre:
    build: .
    ports:
      - "8239:8239"
    restart: unless-stopped
    environment:
      - GIN_MODE=release
      - TZ=Asia/Kolkata
      - RESET_KEY=spectre-reset-2024
    depends_on:
      ml-sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8239/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ml-sidecar:
    build:
      context: .
      dockerfile: ml_sidecar/Dockerfile
    ports:
      - "127.0.0.1:8240:8240"
    restart: unless-stopped
    environment:
      - TZ=Asia/Kolkata
    volumes:
      - ./ml_sidecar/models:/app/models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8240/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      spectre:
        condition: service_healthy
      ml-sidecar:
        condition: service_healthy
