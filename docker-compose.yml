version: "3.9"

services:
  spectre:
    build: .
    ports:
      - "8239:8239"
    restart: unless-stopped
    environment:
      - GIN_MODE=release
      - TZ=Asia/Kolkata
      - RESET_KEY=spectre-reset-2024
      # Persistent CSV storage — survives container rebuilds.
      - SPECTRE_DATA_DIR=/app/data
      # Auth — set in Dokploy. SESSION_SECRET should be a random 32+ byte hex string.
      # BOOTSTRAP_ADMIN_USER + BOOTSTRAP_ADMIN_PASSWORD only used on first startup
      # if data/users.json doesn't exist — remove from Dokploy after first login.
      - SESSION_SECRET=${SESSION_SECRET}
      - BOOTSTRAP_ADMIN_USER=${BOOTSTRAP_ADMIN_USER:-admin}
      - BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD}
    volumes:
      # Named volume — managed by Docker, independent of git checkout.
      # Survives Dokploy redeploys, repo re-clones, and `docker compose down`.
      # Backed up via Dokploy's "Volume Backups" tab.
      - spectre_data:/app/data
    depends_on:
      ml-sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8239/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ml-sidecar:
    build:
      context: .
      dockerfile: ml_sidecar/Dockerfile
    ports:
      - "127.0.0.1:8240:8240"
    restart: unless-stopped
    environment:
      - TZ=Asia/Kolkata
    volumes:
      # Named volume for ALL model artifacts + runtime data.
      # On first deploy the entrypoint seeds from the baked-in /app/models_seed.
      # On subsequent deploys the volume already has data — seed is skipped.
      # Backed up via Dokploy's "Volume Backups" tab (weekly).
      - ml_models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8240/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      spectre:
        condition: service_healthy
      ml-sidecar:
        condition: service_healthy

volumes:
  spectre_data:        # system_signals.csv, executed_trades.csv, users.json, etc.
  ml_models:           # ALL ML model files (.pkl, .keras, .json) + overnight data
